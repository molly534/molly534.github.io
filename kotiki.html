<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Котостудия</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #ffffff;
    }

    h1 {
        color: #ff6161;
    }

    input:invalid {
        border: 2px solid #e72e2e;
    }

    input:valid {
        border: 2px solid #0aac0a;
    }

    section {
        padding: 40px;
    }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Котостудия</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#about">О нас</a></li>
                <li class="nav-item"><a class="nav-link" href="#gallery">Галерея</a></li>
                <li class="nav-item"><a class="nav-link" href="#form">Запись</a></li>
            </ul>
        </div>
    </div>
</nav>
<section id="about" class="text-center">
    <div class="container">
        <h1>Мы фотографируем котиков</h1>
        <p>Добро пожаловать в "Котостудию" - пространство где пушистики становятся моделями!</p>
    </div>
</section>
<section id="gallery">
    <div class="container">
        <h2 class="text-center mb-4">Галерея</h2>
        <div class="row">
            <div class="col-md-4 mb-3">
                <img src="https://i.pinimg.com/736x/c2/11/cd/c211cdd287b0dcf042d594e0dd26c82c.jpg" class="img-fluid rounded">
            </div>
            <div class="col-md-4 mb-3">
                <img src="https://i.pinimg.com/736x/f1/1b/10/f11b106ae9324ab11df270c936a692a5.jpg" class="img-fluid rounded">
            </div>
            <div class="col-md-4 mb-3">
                <img src="https://i.pinimg.com/736x/a4/20/a7/a420a7afa5526c0cdea1159e4fccce1b.jpg" class="img-fluid rounded">
            </div>
        </div>
    </div>
</section>
<section id="form">
    <div class="container">
        <h2 class="text-center mb-4">Записаться на съемку</h2>
        <form style="max-width: 400px; margin: auto;">
            <input class="form-control mb-3" type="text" placeholder="Ваше имя" required pattern="[A-Za-zА-Яа-яЁё\s]{2,}">
            <input class="form-control mb-3" type="email" placeholder="Email" required>
            <input class="form-control mb-3" type="text" placeholder="Имя котика" required minlength="2">
            <button class="btn btn-primary w-100">Отправить</button>
        </form>
    </div>
</section>
<footer class="bg-dark text-white text-center p-3">
        <p>Котостудия</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
